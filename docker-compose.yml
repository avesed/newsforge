services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-newsforge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-newsforge}
      POSTGRES_DB: ${POSTGRES_DB:-newsforge}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-newsforge}"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2G

  redis:
    image: redis:7-alpine
    # noeviction: auth denylist keys (jwt:refresh:revoked:*) are
    # security-critical — under allkeys-lru they could be silently evicted,
    # defeating logout and refresh-token reuse detection. When memory is
    # full, writes fail; callers already tolerate cache-write failures.
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy noeviction
      --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  rsshub:
    image: diygod/rsshub:latest
    restart: unless-stopped
    environment:
      - CACHE_TYPE=redis
      - REDIS_URL=redis://redis:6379/1
    depends_on:
      redis:
        condition: service_healthy
    mem_limit: 512m
    profiles:
      - rsshub

  # Production: all-in-one (backend + consumer + scheduler + nginx)
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    ports:
      - "8080:80"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-newsforge}:${POSTGRES_PASSWORD:-newsforge}@postgres:5432/${POSTGRES_DB:-newsforge}
      REDIS_URL: redis://redis:6379/0
      RSSHUB_URL: http://rsshub:1200
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}
      DEBUG: ${DEBUG:-false}
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    volumes:
      - articledata:/app/data/articles
    deploy:
      resources:
        limits:
          memory: 4G

volumes:
  pgdata:
  redisdata:
  articledata:

# NewsForge Pipeline Configuration
# Controls processing depth per category + dynamic agent triggers

# LLM provider settings
llm:
  # Default provider for all pipeline operations
  default_provider: openai
  default_model: gpt-4o-mini

  # Per-purpose model overrides (optional)
  # classifier_model: gpt-4o-mini    # Article classification
  # summarizer_model: gpt-4o-mini    # Summarization agents
  # sentiment_model: gpt-4o-mini     # Sentiment analysis
  # entity_extraction_model: gpt-4o-mini  # Entity extraction
  # scorer_model: gpt-4o-mini        # Impact scoring
  # tagger_model: gpt-4o-mini        # Tagging
  # analyzer_model: gpt-4o           # Deep analysis / domain-specific
  # embedding_model: text-embedding-3-small

# Dynamic agent trigger configuration
agent_triggers:
  # Always run for high-value articles (unified agents handle all categories)
  # Note: embedding is now a pipeline stage (not an agent), runs before classify
  always:
    - summarizer
    - entity
    - translator

  # Category-specific agents (none — finance_analyzer handles all categories)
  category_triggered:
    finance: []
    tech: []
    politics: []
    world: []
    entertainment: []
    gaming: []
    sports: []
    science: []
    health: []
    other: []

  # Condition-based triggers (evaluated at runtime)
  condition_triggered: []

  # finance_analyzer trigger conditions (any one met → trigger):
  # 1. Article classified as one of these categories
  # 2. has_market_impact = true
  # 3. Source/feed pre-tagged as finance
  finance_analyzer_categories:
    - finance
    - tech
    - politics

# Agent priority tiers — split agents into P1 (user-facing, fast) and P2 (analytical, async)
# P1 agents complete before article is shown to user; P2 runs fire-and-forget afterward.
agent_priority:
  p2_enabled: true              # false = standalone deployment, skip all analytical agents
  p1_agents:                    # User-facing agents (fast, always enabled)
    - summarizer
    - translator
    - entity
  # All other resolved agents are implicitly P2 (finance_analyzer,
  # tech_trend, politics_impact)

# Routing rules — value-based processing tiers
routing_rules:
  high_value_threshold: 60       # >= 60: full agent pipeline
  medium_value_threshold: 30     # 30-59: limited agents (summarizer + sentiment + translator)
  lightweight_threshold: 0       # >0: lightweight path (summarizer + entity + tagger + translator)
  market_impact_upgrades_to_high: true  # has_market_impact forces high-value path
  lightweight_agents:            # Agents for lightweight articles (score 15-29)
    - summarizer
    - entity
    - translator
  medium_value_agents:           # Agents for medium-value articles
    - summarizer
    - entity
    - translator

# Per-category pipeline depth (legacy — still used for content fetch decisions)
categories:
  finance:
    enable_scoring: true
    scoring_threshold: 105
    enable_content_fetch: true
    enable_deep_analysis: true
    enable_entity_extraction: true
    entity_types: [person, location, event]
    enable_sentiment: true
    # enable_embedding: removed — embedding now runs as pipeline stage for all articles

  tech:
    enable_scoring: true
    scoring_threshold: 105
    enable_content_fetch: true
    enable_deep_analysis: true
    enable_entity_extraction: true
    entity_types: [person, location, event]
    enable_sentiment: true
    # enable_embedding: removed — embedding now runs as pipeline stage for all articles

  politics:
    enable_scoring: false
    enable_content_fetch: true
    enable_deep_analysis: false
    enable_entity_extraction: true
    entity_types: [person, location, event]
    enable_sentiment: true
    # enable_embedding: removed — embedding now runs as pipeline stage for all articles

  entertainment:
    enable_scoring: false
    enable_content_fetch: true
    enable_deep_analysis: false
    enable_entity_extraction: true
    entity_types: [person, location, event]
    enable_sentiment: true
    # enable_embedding: removed — embedding now runs as pipeline stage for all articles

  gaming:
    enable_scoring: false
    enable_content_fetch: true
    enable_deep_analysis: false
    enable_entity_extraction: true
    entity_types: [person, event]
    enable_sentiment: true
    # enable_embedding: removed — embedding now runs as pipeline stage for all articles

  sports:
    enable_scoring: false
    enable_content_fetch: true
    enable_deep_analysis: false
    enable_entity_extraction: true
    entity_types: [person, event]
    enable_sentiment: true
    # enable_embedding: removed — embedding now runs as pipeline stage for all articles

  world:
    enable_scoring: false
    enable_content_fetch: true
    enable_deep_analysis: false
    enable_entity_extraction: true
    entity_types: [person, location, event]
    enable_sentiment: true
    # enable_embedding: removed — embedding now runs as pipeline stage for all articles

  science:
    enable_scoring: false
    enable_content_fetch: true
    enable_deep_analysis: false
    enable_entity_extraction: false
    enable_sentiment: false
    # enable_embedding: removed — embedding now runs as pipeline stage for all articles

  health:
    enable_scoring: false
    enable_content_fetch: true
    enable_deep_analysis: false
    enable_entity_extraction: false
    enable_sentiment: false
    # enable_embedding: removed — embedding now runs as pipeline stage for all articles

  other:
    enable_scoring: false
    enable_content_fetch: false
    enable_deep_analysis: false
    enable_entity_extraction: false
    enable_sentiment: false
    # enable_embedding: removed — embedding now runs as pipeline stage for all articles

# News Sources
sources:
  finnhub:
    enabled: true
    source_type: api
    poll_interval_seconds: 600      # 10 min — Finnhub free tier: 60 calls/min
    default_symbols:
      - AAPL
      - MSFT
      - GOOGL
      - AMZN
      - NVDA
      - META
      - TSLA
    include_general_news: true
    company_news_lookback_days: 7
    request_timeout: 30.0

# Scheduling
scheduler:
  feed_poll_interval_seconds: 300    # 5 min default
  cleanup_interval_hours: 24
  article_retention_days: 30
  pipeline_event_retention_days: 7

# Agent Worker — unified agent queue (all LLM agent calls go through this)
agent_worker:
  concurrency: 6                      # max parallel agent groups
  per_group_timeout_seconds: 600      # timeout per agent group
  queue_key: "nf:agent:queue"

# Consumer
consumer:
  concurrency: 10
  per_article_timeout_seconds: 900
  max_retries: 3
  retry_backoff_base_seconds: 30
  max_articles_before_restart: 5000
  max_uptime_seconds: 86400
  story_batch_size: 8              # articles per story clustering batch

# Story refresh — keep storylines updated as new articles join
story_refresh:
  threshold_articles: 3            # trigger LLM refresh after N new articles linked
  fallback_interval_hours: 1       # scheduler scans for pending refreshes this often
  fallback_min_age_hours: 6        # only fallback-refresh stories not refreshed in this window
  max_per_run: 20                  # cap stories refreshed per scheduler tick
  max_articles_in_prompt: 12       # newest N articles fed to refresh LLM
  timeline_max_entries: 30         # cap stored timeline length
  circuit_breaker_failure_threshold: 5    # consecutive failures to trip
  circuit_breaker_recovery_timeout: 60    # seconds before probing

# Dedup
dedup:
  url_normalize: true
  simhash_threshold: 3          # Hamming distance
  dedup_window_hours: 24
  # Semantic dedup (embedding-based, runs after content fetch + clean)
  embedding_dimensions: 512
  semantic_threshold: 0.95       # cosine > this = duplicate, discard
  event_group_threshold: 0.88   # cosine > this = same event, group together
  semantic_window_hours: 12     # only compare with articles from last N hours

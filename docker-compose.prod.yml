services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-newsforge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-newsforge}
      POSTGRES_DB: ${POSTGRES_DB:-newsforge}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-newsforge}"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2G

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  rsshub:
    image: diygod/rsshub:latest
    restart: unless-stopped
    environment:
      - CACHE_TYPE=redis
      - REDIS_URL=redis://redis:6379/1
    depends_on:
      redis:
        condition: service_healthy
    mem_limit: 512m
    profiles:
      - rsshub

  app:
    image: ghcr.io/avesed/newsforge:latest
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-newsforge}:${POSTGRES_PASSWORD:-newsforge}@postgres:5432/${POSTGRES_DB:-newsforge}
      REDIS_URL: redis://redis:6379/0
      RSSHUB_URL: http://rsshub:1200
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      DEBUG: "false"
    env_file:
      - path: .env
        required: false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    volumes:
      - articledata:/app/data/articles
    deploy:
      resources:
        limits:
          memory: 4G

volumes:
  pgdata:
  redisdata:
  articledata:
